<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - Amar JV Trading</title>
    <style>
        :root { --primary: #00a651; --secondary: #1a73e8; --danger: #ea4335; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; overflow-x: hidden; }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c3e50, #1a252f);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .app-icon {
            width: 140px; height: 140px; background: var(--primary);
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 35px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid white;
            transition: transform 0.3s; margin-bottom: 20px;
        }
        .app-icon:hover { transform: scale(1.1); box-shadow: 0 15px 40px rgba(0, 166, 81, 0.4); }
        .welcome-text { color: white; font-size: 26px; font-weight: bold; letter-spacing: 2px; }
        .click-hint { color: #bdc3c7; margin-top: 10px; font-size: 14px; }

        /* --- Main Layout --- */
        #main-content { display: none; padding: 20px; }
        .container { 
            max-width: 1300px; margin: auto; background: white; padding: 25px; 
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: relative;
        }

        .watermark-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            pointer-events: none; z-index: 0; opacity: 0.05;
        }
        .wm-text { transform: rotate(-25deg); font-weight: bold; font-size: 20px; }

        .top-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; position: relative; z-index: 2;}
        .brand-inputs { display: flex; gap: 10px; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; gap: 5px; font-size: 13px; }
        .btn-blue { background: var(--secondary); } .btn-green { background: var(--primary); } .btn-orange { background: #f39c12; } .btn-purple { background: #673ab7; }

        .sheet-bar { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding: 5px; }
        .sheet-tab { padding: 8px 15px; background: #eee; border-radius: 5px; cursor: pointer; font-weight: bold; display: flex; align-items: center; }
        .sheet-tab.active { background: var(--secondary); color: white; }
        .del-x { margin-left: 8px; color: red; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; z-index: 2; position: relative; }
        th { background: var(--dark); color: white; padding: 10px; border: 1px solid #ddd; }
        td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .qty-input { width: 70px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }

        .footer { display: flex; justify-content: space-between; margin-top: 25px; position: relative; z-index: 2;}
        .calc-card { width: 340px; background: var(--dark); color: white; padding: 15px; border-radius: 10px; }
        .net-payable { border-top: 2px solid #555; padding-top: 10px; font-size: 22px; color: #2ecc71; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 400px; border-radius: 10px; }
        
        #syncStatus { position: fixed; bottom: 10px; left: 10px; background: #333; color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; display: none; z-index: 10000; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div id="syncStatus">Syncing...</div>

<div id="splash-screen">
    <div class="app-icon" onclick="openApp()">Amar JV</div>
    <div class="welcome-text">AMAR JV TRADING</div>
    <div class="click-hint">Click Icon to Sync & Open</div>
</div>

<div id="main-content">
    <div class="container">
        <div class="watermark-layer">
            <div class="wm-text">Amar JV</div><div class="wm-text">Amar JV</div><div class="wm-text">Amar JV</div>
            <div class="wm-text">Amar JV</div><div class="wm-text">Amar JV</div><div class="wm-text">Amar JV</div>
        </div>

        <div class="top-header">
            <div class="brand-inputs">
                <div>DSR <br><input type="text" id="dsrName"></div>
                <div>Company <br><input type="text" id="compName"></div>
                <div>Date <br><input type="date" id="mainDate" onchange="renderApp()"></div>
            </div>
            <div class="no-print" style="display:flex; gap:8px; flex-wrap: wrap;">
                <button class="btn btn-blue" onclick="openModal('productModal')">+ Product</button>
                <button class="btn btn-orange" onclick="openStockModal()">📦 Stock</button>
                <button class="btn btn-purple" onclick="openDeleteModal()">🗑️ Delete</button>
                <button class="btn btn-green" id="saveBtn" onclick="saveAndSync()">💾 Save & Sync</button>
                <button class="btn btn-purple" onclick="window.print()">Print</button>
            </div>
        </div>

        <div class="sheet-bar no-print" id="sheetList"></div>

        <table>
            <thead>
                <tr>
                    <th>SL</th><th>Description</th><th>CTN</th><th>Stock</th><th>DLV</th><th>RTN</th><th>Sale</th><th>Rate</th><th>Total</th>
                </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
        </table>

        <div class="footer">
            <button class="btn btn-blue no-print" onclick="loadFromCloud()">🔄 Refresh Data</button>
            <div class="calc-card">
                <div style="display:flex; justify-content:space-between"><span>Gross:</span> <span id="totalDisplay">0</span></div>
                <div style="display:flex; justify-content:space-between; margin:8px 0;"><span>Damage:</span> <input type="number" id="damageInput" class="qty-input" value="0" oninput="tempCalc()"></div>
                <div style="display:flex; justify-content:space-between; margin:8px 0;"><span>Discount:</span> <input type="number" id="discountInput" class="qty-input" value="0" oninput="tempCalc()"></div>
                <div class="net-payable"><div style="display:flex; justify-content:space-between"><span>Net:</span> <span id="netDisplay">0</span></div></div>
            </div>
        </div>
    </div>
</div>

<div id="productModal" class="modal"><div class="modal-content"><h3>Add Product</h3><input type="text" id="mPName" placeholder="Name" style="width:95%"><br><br><input type="number" id="mPRate" placeholder="Rate" style="width:95%"><br><br><input type="number" id="mPCtn" value="1" placeholder="CTN Size" style="width:95%"><br><br><button class="btn btn-blue" style="width:100%" onclick="saveNewProduct()">Save</button><br><button onclick="closeModals()" style="width:100%; margin-top:5px;">Cancel</button></div></div>
<div id="stockModal" class="modal"><div class="modal-content"><h3>Add Stock</h3><div id="stockListContent"></div><br><button class="btn btn-green" style="width:100%" onclick="closeModals()">Done</button></div></div>
<div id="deleteModal" class="modal"><div class="modal-content"><h3>Delete Item</h3><div id="deleteListContent"></div><br><button onclick="closeModals()" style="width:100%">Close</button></div></div>

<script>
    const G_SHEET_URL = "https://script.google.com/macros/s/AKfycbYC93Mmd-vw9i9dyotf0LlyzG1_zOW_TPksUzLYZCw5MlVhhHD5hxFqEHstmjG7Jlcp5Q/exec";
    let currentSheet = 1;
    let isEditMode = true;
    document.getElementById('mainDate').valueAsDate = new Date();

    async function openApp() {
        showStatus("Syncing with Cloud...");
        await loadFromCloud();
        document.getElementById('splash-screen').style.transform = 'translateY(-100%)';
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }, 600);
    }

    function showStatus(msg) {
        const s = document.getElementById('syncStatus');
        s.innerText = msg; s.style.display = 'block';
        setTimeout(() => s.style.display = 'none', 3000);
    }

    async function saveAndSync() {
        saveLocal();
        showStatus("Uploading to Cloud...");
        let data = {};
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            data[key] = localStorage.getItem(key);
        }
        try {
            await fetch(G_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Cloud Sync Successful!");
            isEditMode = false; renderApp();
        } catch (e) { alert("Cloud Sync Failed!"); }
    }

    async function loadFromCloud() {
        try {
            let res = await fetch(G_SHEET_URL);
            let onlineData = await res.json();
            if (onlineData) {
                localStorage.clear();
                for (let key in onlineData) { localStorage.setItem(key, onlineData[key]); }
                renderApp();
            }
        } catch (e) { console.log("Load Error"); }
    }

    function renderApp() {
        let date = document.getElementById('mainDate').value;
        let master = JSON.parse(localStorage.getItem('master_products')) || [];
        let sheets = JSON.parse(localStorage.getItem('sheets_'+date)) || [1];
        
        document.getElementById('sheetList').innerHTML = sheets.map(s => `
            <div class="sheet-tab ${currentSheet === s ? 'active' : ''}" onclick="currentSheet=${s}; isEditMode=false; renderApp()">
                Sheet ${s} <span class="del-x" onclick="event.stopPropagation(); deleteSheet(${s})">×</span>
            </div>
        `).join('') + `<button class="btn btn-green" onclick="addNewSheet()">+ New</button>`;

        let sheetData = JSON.parse(localStorage.getItem(`data_${date}_s${currentSheet}`)) || { dsr:"", comp:"", entries:{}, damage:0, discount:0, saved:false };
        let locked = sheetData.saved && !isEditMode;

        document.getElementById('dsrName').value = sheetData.dsr;
        document.getElementById('compName').value = sheetData.comp;
        document.getElementById('damageInput').value = sheetData.damage;
        document.getElementById('discountInput').value = sheetData.discount || 0;

        let body = document.getElementById('inventoryBody');
        body.innerHTML = master.map((p, i) => {
            let e = sheetData.entries[p.name] || { dlv:0, rtn:0 };
            let sale = e.dlv - e.rtn;
            return `<tr><td>${i+1}</td><td style="text-align:left">${p.name}</td><td>${p.ctn}</td><td>${p.stock}</td>
            <td><input type="number" id="dlv_${i}" class="qty-input" value="${e.dlv}" oninput="tempCalc()" ${locked?'disabled':''}></td>
            <td><input type="number" id="rtn_${i}" class="qty-input" value="${e.rtn}" oninput="tempCalc()" ${locked?'disabled':''}></td>
            <td id="sale_${i}">${sale}</td><td>${p.rate}</td><td id="total_${i}">${(sale*p.rate).toLocaleString()}</td></tr>`;
        }).join('');
        tempCalc();
    }

    function tempCalc() {
        let master = JSON.parse(localStorage.getItem('master_products')) || [];
        let grand = 0;
        master.forEach((p, i) => {
            let sale = (parseInt(document.getElementById(`dlv_${i}`).value)||0) - (parseInt(document.getElementById(`rtn_${i}`).value)||0);
            document.getElementById(`sale_${i}`).innerText = sale;
            document.getElementById(`total_${i}`).innerText = (sale * p.rate).toLocaleString();
            grand += (sale * p.rate);
        });
        document.getElementById('totalDisplay').innerText = grand.toLocaleString();
        let net = grand - (parseInt(document.getElementById('damageInput').value)||0) - (parseInt(document.getElementById('discountInput').value)||0);
        document.getElementById('netDisplay').innerText = net.toLocaleString() + " TK";
    }

    function saveLocal() {
        let date = document.getElementById('mainDate').value;
        let master = JSON.parse(localStorage.getItem('master_products')) || [];
        let key = `data_${date}_s${currentSheet}`;
        let oldData = JSON.parse(localStorage.getItem(key)) || { entries: {} };
        let entries = {};
        master.forEach((p, i) => {
            let dlv = parseInt(document.getElementById(`dlv_${i}`).value)||0;
            let rtn = parseInt(document.getElementById(`rtn_${i}`).value)||0;
            let newSale = dlv - rtn;
            let oldSale = oldData.entries[p.name]?.sale || 0;
            master[i].stock -= (newSale - oldSale); // স্টক আপডেট
            entries[p.name] = { dlv, rtn, sale: newSale };
        });
        localStorage.setItem(key, JSON.stringify({
            dsr: document.getElementById('dsrName').value,
            comp: document.getElementById('compName').value,
            entries: entries,
            damage: parseInt(document.getElementById('damageInput').value)||0,
            discount: parseInt(document.getElementById('discountInput').value)||0,
            saved: true
        }));
        localStorage.setItem('master_products', JSON.stringify(master));
    }

    function saveNewProduct() {
        let master = JSON.parse(localStorage.getItem('master_products')) || [];
        master.push({ name: document.getElementById('mPName').value, rate: parseFloat(document.getElementById('mPRate').value), ctn: document.getElementById('mPCtn').value, stock: 0 });
        localStorage.setItem('master_products', JSON.stringify(master));
        closeModals();
    }

    function deleteSheet(n) {
        if(confirm("Delete sheet?")) {
            let date = document.getElementById('mainDate').value;
            let sheets = JSON.parse(localStorage.getItem('sheets_'+date)).filter(s => s !== n);
            localStorage.setItem('sheets_'+date, JSON.stringify(sheets));
            localStorage.removeItem(`data_${date}_s${n}`);
            currentSheet = sheets[0] || 1; renderApp();
        }
    }

    function addNewSheet() {
        let date = document.getElementById('mainDate').value;
        let sheets = JSON.parse(localStorage.getItem('sheets_'+date)) || [1];
        let next = Math.max(...sheets) + 1;
        sheets.push(next);
        localStorage.setItem('sheets_'+date, JSON.stringify(sheets));
        currentSheet = next; isEditMode = true; renderApp();
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; if(id==='stockModal') loadStock(); if(id==='deleteModal') loadDelete(); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); renderApp(); }

    function loadStock() {
        let master = JSON.parse(localStorage.getItem('master_products')) || [];
        document.getElementById('stockListContent').innerHTML = master.map((p, i) => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${p.name} (${p.stock})</span><input type="number" style="width:60px" onchange="updStock(${i}, this.value)"></div>`).join('');
    }
    function updStock(i, v) { let m = JSON.parse(localStorage.getItem('master_products')); m[i].stock += (parseInt(v)||0); localStorage.setItem('master_products', JSON.stringify(m)); loadStock(); }

    function loadDelete() {
        let master = JSON.parse(localStorage.getItem('master_products')) || [];
        document.getElementById('deleteListContent').innerHTML = master.map((p, i) => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${p.name}</span><button onclick="delProd(${i})">Del</button></div>`).join('');
    }
    function delProd(i) { let m = JSON.parse(localStorage.getItem('master_products')); m.splice(i, 1); localStorage.setItem('master_products', JSON.stringify(m)); loadDelete(); }
</script>
</body>
</html>
