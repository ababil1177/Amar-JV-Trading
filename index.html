<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Inventory System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .date-picker { font-size: 18px; padding: 8px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }
        
        .input-section { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; padding: 10px; border-bottom: 2px solid #eee; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; flex: 1; min-width: 150px; }
        .btn-add { background: #1a73e8; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #00a651; color: white; padding: 12px; border: 1px solid #ddd; }
        td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .btn-delete { background: #ea4335; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        
        .summary { margin-top: 20px; text-align: right; font-size: 22px; font-weight: bold; color: #202124; padding: 15px; background: #e8f0fe; border-radius: 8px; }
        .print-btn { background: #5f6368; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Daily Sales & Inventory</h2>

    <div class="header-section">
        <div>
            <strong>তারিখ নির্বাচন করুন: </strong>
            <input type="date" id="currentDate" class="date-picker" onchange="loadDateData()">
        </div>
        <button class="print-btn" onclick="window.print()">Print / Save PDF</button>
    </div>

    <div class="input-section">
        <input type="text" id="pName" placeholder="প্রোডাক্টের নাম">
        <input type="number" id="pPrice" placeholder="রেট">
        <button class="btn-add" onclick="addProduct()">+ Add Product</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>SL</th>
                <th>Item Description</th>
                <th>DLV</th>
                <th>RTN</th>
                <th>Final</th>
                <th>Price</th>
                <th>Total Price</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
    </table>

    <div class="summary" id="grandTotalDisplay">Grand Total: 0 TK</div>
</div>

<script>
    // আজকের তারিখ ডিফল্ট হিসেবে সেট করা
    document.getElementById('currentDate').valueAsDate = new Date();

    function getStorageKey() {
        return "inventory_" + document.getElementById('currentDate').value;
    }

    function loadDateData() {
        renderTable();
    }

    function renderTable() {
        const key = getStorageKey();
        let products = JSON.parse(localStorage.getItem(key)) || [];
        const tableBody = document.getElementById('productTableBody');
        tableBody.innerHTML = "";
        let grandTotal = 0;

        products.forEach((prod, index) => {
            const final = (prod.dlv || 0) - (prod.rtn || 0);
            const totalPrice = final * prod.price;
            grandTotal += totalPrice;

            tableBody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td style="text-align:left">${prod.name}</td>
                    <td><input type="number" value="${prod.dlv || 0}" onchange="updateQty(${index}, 'dlv', this.value)"></td>
                    <td><input type="number" value="${prod.rtn || 0}" onchange="updateQty(${index}, 'rtn', this.value)"></td>
                    <td><b>${final}</b></td>
                    <td>${prod.price}</td>
                    <td style="color:red; font-weight:bold">${totalPrice.toLocaleString()}</td>
                    <td><button class="btn-delete" onclick="deleteProduct(${index})">Delete</button></td>
                </tr>
            `;
        });

        document.getElementById('grandTotalDisplay').innerText = "Grand Total: " + grandTotal.toLocaleString() + " TK";
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = parseFloat(document.getElementById('pPrice').value);
        const key = getStorageKey();
        let products = JSON.parse(localStorage.getItem(key)) || [];

        if (name && price) {
            products.push({ name, price, dlv: 0, rtn: 0 });
            localStorage.setItem(key, JSON.stringify(products));
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
            renderTable();
        } else {
            alert("সঠিক তথ্য দিন!");
        }
    }

    function updateQty(index, field, value) {
        const key = getStorageKey();
        let products = JSON.parse(localStorage.getItem(key)) || [];
        products[index][field] = parseInt(value) || 0;
        localStorage.setItem(key, JSON.stringify(products));
        renderTable();
    }

    function deleteProduct(index) {
        if(confirm("ডিলিট করতে চান?")) {
            const key = getStorageKey();
            let products = JSON.parse(localStorage.getItem(key)) || [];
            products.splice(index, 1);
            localStorage.setItem(key, JSON.stringify(products));
            renderTable();
        }
    }

    // শুরুতে ডাটা লোড করা
    renderTable();
</script>

</body>
</html>
